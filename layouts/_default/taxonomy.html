
{{ define "main" }}
<h1 class="animated">{{ .Title }}</h1>
<article class="animated">
    <nav class="button-links">
        {{ range .Pages }}
        <a class="button-link" href="{{ .Permalink }}">
            <span class="content">
                <span class="title">{{ .Title }}</span>
                <span class="description">{{ .Date.Format "January 2, 2006" }}</span>
            </span>
        </a>
        {{ end }}
    </nav>
</article>
{{ end }}
